<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CYBERPUNK CRITICAL ERROR</title>
    <style>
        :root {
            --neon-pink: #ff007f;
            --neon-blue: #00f0ff;
            --bg-color: #05050a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            overflow: hidden;
            font-family: 'Impact', 'Arial Black', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 动态背景画布 */
        #background-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* 3D 滚动赛博网格 */
        .grid-bg {
            position: absolute;
            bottom: 0;
            left: -50%;
            width: 200%;
            height: 100%;
            background-image: 
                linear-gradient(to right, rgba(0, 240, 255, 0.1) 2px, transparent 2px),
                linear-gradient(to bottom, rgba(255, 0, 127, 0.1) 2px, transparent 2px);
            background-size: 50px 50px;
            transform: perspective(300px) rotateX(75deg);
            transform-origin: bottom;
            animation: gridMove 2.5s linear infinite;
            z-index: 2;
        }

        @keyframes gridMove {
            0% { background-position: 0 0; }
            100% { background-position: 0 50px; }
        }

        /* CRT 扫描线 */
        .scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                rgba(18, 16, 16, 0) 50%, 
                rgba(0, 0, 0, 0.4) 50%
            );
            background-size: 100% 6px;
            z-index: 10;
            pointer-events: none;
        }

        /* 核心文字容器 - 全屏居中 */
        .container {
            position: relative;
            z-index: 5;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0 20px;
        }

        /* 超夸张大文字 + 呼吸缩放 */
        .glitch-text {
            position: relative;
            /* 采用响应式视口单位 vw，确保在任何屏幕上都顶天立地 */
            font-size: 13vw; 
            font-weight: 900;
            color: #fff;
            letter-spacing: -2px;
            text-align: center;
            line-height: 1.1;
            white-space: nowrap;
            text-shadow: 0 0 20px var(--neon-blue), 0 0 50px var(--neon-pink);
            animation: glitch 0.8s linear infinite, textPulse 4s ease-in-out infinite;
        }

        /* 极端夸张的前后分层故障影分身 */
        .glitch-text::before,
        .glitch-text::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: transparent;
        }

        .glitch-text::before {
            left: 5px;
            text-shadow: -5px 0 #ff0055, 0 0 30px #ff0055;
            clip: rect(10px, 9999px, 85px, 0);
            animation: glitch-anim 2s infinite linear alternate-reverse;
        }

        .glitch-text::after {
            left: -5px;
            text-shadow: -5px 0 #00ffff, 0 5px #ff007f;
            clip: rect(70px, 9999px, 150px, 0);
            animation: glitch-anim2 1.5s infinite linear alternate-reverse;
        }

        /* 文字巨量缩放与狂暴闪烁动画 */
        @keyframes textPulse {
            0%, 100% { transform: scale(1); filter: hue-rotate(0deg); }
            50% { transform: scale(1.1); filter: hue-rotate(45deg); }
            95% { opacity: 1; }
            96% { opacity: 0.3; }
            97% { opacity: 1; }
        }

        /* 狂暴抖动 */
        @keyframes glitch {
            0% { transform: translate(0) skew(0deg); }
            10% { transform: translate(-4px, 3px) skew(-3deg); }
            20% { transform: translate(4px, -3px) skew(3deg); }
            30% { transform: translate(-2px, -2px) skew(0deg); }
            40% { transform: translate(3px, 3px) skew(2deg); }
            50% { transform: translate(-3px, 1px) skew(-2deg); }
            60% { transform: translate(2px, -4px) skew(1deg); }
            70% { transform: translate(-1px, 2px) skew(0deg); }
            80% { transform: translate(4px, -1px) skew(-1deg); }
            90% { transform: translate(-3px, -3px) skew(4deg); }
            100% { transform: translate(0) skew(0deg); }
        }

        /* 故障切片截取动画 */
        @keyframes glitch-anim {
            0% { clip: rect(15px, 9999px, 60px, 0); }
            20% { clip: rect(100px, 9999px, 150px, 0); }
            40% { clip: rect(40px, 9999px, 110px, 0); }
            60% { clip: rect(5px, 9999px, 95px, 0); }
            80% { clip: rect(120px, 9999px, 170px, 0); }
            100% { clip: rect(30px, 9999px, 130px, 0); }
        }

        @keyframes glitch-anim2 {
            0% { clip: rect(85px, 9999px, 140px, 0); }
            25% { clip: rect(10px, 9999px, 55px, 0); }
            50% { clip: rect(110px, 9999px, 165px, 0); }
            75% { clip: rect(50px, 9999px, 105px, 0); }
            100% { clip: rect(5px, 9999px, 80px, 0); }
        }

        /* 移动端特殊字号微调，防止超出 */
        @media (max-width: 768px) {
            .glitch-text { font-size: 15vw; white-space: normal; word-break: break-all; }
        }
    </style>
</head>
<body>

    <canvas id="background-canvas"></canvas>
    <div class="grid-bg"></div>
    <div class="scanlines"></div>

    <div class="container">
        <h1 class="glitch-text" data-text="赵颖大傻逼">赵颖大傻逼</h1>
    </div>

    <script>
        // 背景高频数字流粒子特效
        const canvas = document.getElementById('background-canvas');
        const ctx = canvas.getContext('2d');

        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        const chars = "☠01CRITICAL_ERROR_SYSTEM_FAILURE_99%_☠".split("");
        const fontSize = 16;
        const columns = width / fontSize;
        const drops = [];

        for (let x = 0; x < columns; x++) {
            drops[x] = Math.random() * -100; // 让出场时间错开
        }

        function draw() {
            ctx.fillStyle = "rgba(5, 5, 10, 0.12)"; // 较深的尾迹
            ctx.fillRect(0, 0, width, height);

            for (let i = 0; i < drops.length; i++) {
                const text = chars[Math.floor(Math.random() * chars.length)];
                
                // 荧光青、荧光粉、纯白交替出现
                const rand = Math.random();
                ctx.fillStyle = rand > 0.6 ? "#00f0ff" : (rand > 0.2 ? "#ff007f" : "#ffffff");
                ctx.font = "bold " + fontSize + "px monospace";
                
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);

                if (drops[i] * fontSize > height && Math.random() > 0.98) {
                    drops[i] = 0;
                }
                drops[i] += 1.5; // 加快下落速度
            }
        }

        // 提高刷新率让动画更丝滑爆裂
        setInterval(draw, 25);

        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
