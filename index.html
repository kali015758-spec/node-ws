<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>赵颖大傻逼</title>
    <style>
        :root {
            --neon-pink: #ff007f;
            --neon-blue: #00f0ff;
            --bg-color: #05050a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            overflow: hidden;
            font-family: 'Impact', 'Arial Black', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 动态背景画布 */
        #background-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* 3D 滚动赛博网格 */
        .grid-bg {
            position: absolute;
            bottom: 0;
            left: -50%;
            width: 200%;
            height: 100%;
            background-image: 
                linear-gradient(to right, rgba(0, 240, 255, 0.1) 2px, transparent 2px),
                linear-gradient(to bottom, rgba(255, 0, 127, 0.1) 2px, transparent 2px);
            background-size: 50px 50px;
            transform: perspective(300px) rotateX(75deg);
            transform-origin: bottom;
            animation: gridMove 2.5s linear infinite;
            z-index: 2;
        }

        @keyframes gridMove {
            0% { background-position: 0 0; }
            100% { background-position: 0 50px; }
        }

        /* CRT 扫描线 */
        .scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                rgba(18, 16, 16, 0) 50%, 
                rgba(0, 0, 0, 0.4) 50%
            );
            background-size: 100% 6px;
            z-index: 10;
            pointer-events: none;
        }

        /* 核心文字容器 - 全屏居中 */
        .container {
            position: relative;
            z-index: 5;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0 20px;
        }

        /* 超夸张大文字 + 呼吸缩放 */
        .glitch-text {
            position: relative;
            /* 采用响应式视口单位 vw，确保在任何屏幕上都顶天立地 */
            font-size: 13vw; 
            font-weight: 900;
            color: #fff;
            letter-spacing: -2px;
            text-align: center;
            line-height: 1.1;
            white-space: nowrap;
            text-shadow: 0 0 20px var(--neon-blue), 0 0 50px var(--neon-pink);
            animation: glitch 0.8s linear infinite, textPulse 4s ease-in-out infinite;
        }
